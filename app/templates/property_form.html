  
{% extends "layout.html" %}
{% block content %}
<h3 class="mb-3">Nueva visita / nueva casa</h3>
<form method="post" class="card p-3" id="propertyForm">
  <div class="row g-3">

    <div class="col-12 d-flex flex-wrap gap-2 mb-2">
      <button type="button" class="btn btn-outline-secondary quick-status-btn" data-status="No Answer">
        No Answer
      </button>
      <button type="button" class="btn btn-outline-secondary quick-status-btn" data-status="Flyer Left">
        Flyer Left
      </button>
      <button type="button" class="btn btn-outline-secondary quick-status-btn" data-status="Spoke With Owner">
        Spoke
      </button>
      <button type="button" class="btn btn-outline-secondary quick-status-btn" data-status="Follow Up">
        Follow Up
      </button>
      <button type="button" class="btn btn-outline-secondary quick-status-btn" data-status="Inspection Scheduled">
        Inspection
      </button>
    </div>

    <div class="col-12">
      <label class="form-label">Dirección completa</label>
      <input class="form-control" name="full_address" required>
    </div>

    <div class="col-6 col-md-2">
      <label class="form-label"># Casa</label>
      <input class="form-control" name="house_number">
    </div>

    <div class="col-6 col-md-2">
      <label class="form-label">Zipcode</label>
      <input class="form-control" name="zipcode">
    </div>

    <div class="col-12 col-md-4">
      <label class="form-label">Calle</label>
      <input class="form-control" name="street_name">
    </div>

    <div class="col-6 col-md-2">
      <label class="form-label">Ciudad</label>
      <input class="form-control" name="city">
    </div>

    <div class="col-6 col-md-2">
      <label class="form-label">Estado</label>
      <input class="form-control" name="state" value="FL">
    </div>

    <div class="col-6 col-md-2">
      <label class="form-label">County</label>
      <input class="form-control" name="county">
    </div>

    <div class="col-6 col-md-2">
      <label class="form-label">Lat</label>
      <input class="form-control" id="latitude" name="latitude">
    </div>

    <div class="col-6 col-md-2">
      <label class="form-label">Lng</label>
      <input class="form-control" id="longitude" name="longitude">
    </div>

    <div class="col-6 col-md-2 d-flex align-items-end">
      <button type="button" class="btn btn-outline-secondary w-100" onclick="captureGPS()">Usar GPS</button>
    </div>

    <div class="col-12 col-md-4">
      <label class="form-label">Estado rápido</label>
      <select class="form-select" name="current_status" id="current_status">
        {% for s in STATUSES %}
        <option>{{ s }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="col-6 col-md-2">
      <label class="form-label">Carros</label>
      <select class="form-select" name="cars_in_driveway" id="cars_in_driveway">
        <option>0</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4+</option>
      </select>
    </div>

    <div class="col-6 col-md-2">
      <label class="form-label">Asignado a</label>
      <select class="form-select" name="assigned_to">
        <option value=""></option>
        {% for u in users %}
        <option>{{ u.full_name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="col-6 col-md-2 form-check">
      <input class="form-check-input" type="checkbox" name="roof_damage_visible" id="roof_damage_visible">
      <label class="form-check-label" for="roof_damage_visible">Roof damage</label>
    </div>

    <div class="col-6 col-md-2 form-check">
      <input class="form-check-input" type="checkbox" name="flyer_left" id="flyer_left">
      <label class="form-check-label" for="flyer_left">Flyer left</label>
    </div>

    <div class="col-6 col-md-2 form-check">
      <input class="form-check-input" type="checkbox" name="gate_closed" id="gate_closed">
      <label class="form-check-label" for="gate_closed">Gate closed</label>
    </div>

    <div class="col-6 col-md-2 form-check">
      <input class="form-check-input" type="checkbox" name="tarp_visible" id="tarp_visible">
      <label class="form-check-label" for="tarp_visible">Tarp visible</label>
    </div>

    <div class="col-6 col-md-2 form-check">
      <input class="form-check-input" type="checkbox" name="exterior_damage_visible" id="exterior_damage_visible">
      <label class="form-check-label" for="exterior_damage_visible">Exterior damage</label>
    </div>

    <div class="col-6 col-md-2 form-check">
      <input class="form-check-input" type="checkbox" name="water_stain_visible" id="water_stain_visible">
      <label class="form-check-label" for="water_stain_visible">Water stain</label>
    </div>

    <div class="col-12">
      <label class="form-label">Nota rápida</label>
      <input class="form-control" name="quick_note" id="quick_note" placeholder="No answer, 2 cars, roof damage visible, flyer left">
    </div>

    <div class="col-12 d-flex flex-wrap gap-2 mb-2">
      <button type="submit" class="btn btn-primary">Guardar visita rápida</button>
    </div>
    
    <hr class="my-2">
    <h5>Lead completo (si hablaron)</h5>

    <div class="col-12 col-md-4"><label class="form-label">Owner name</label><input class="form-control" name="owner_name"></div>
    <div class="col-12 col-md-4"><label class="form-label">Phone</label><input class="form-control" name="phone"></div>
    <div class="col-12 col-md-4"><label class="form-label">Alternate phone</label><input class="form-control" name="alternate_phone"></div>
    <div class="col-12 col-md-4"><label class="form-label">Email</label><input class="form-control" name="email"></div>
    <div class="col-12 col-md-4"><label class="form-label">Idioma</label><select class="form-select" name="preferred_language"><option></option><option>English</option><option>Spanish</option><option>Creole</option><option>Other</option></select></div>
<div class="col-12 col-md-4">
  <label class="form-label">Insurance company</label>
  <input class="form-control" name="insurance_company" list="insurance_companies" placeholder="Select or type insurance company">
  <datalist id="insurance_companies">
    <option value="Universal Property">
    <option value="Citizens">
    <option value="State Farm">
    <option value="Florida Peninsula">
    <option value="Tower Hill">
    <option value="Security First">
    <option value="Slide Insurance">
    <option value="Heritage">
    <option value="Homeowners Choice">
    <option value="Olympus">
    <option value="TypTap">
    <option value="Progressive">
    <option value="Allstate">
    <option value="UPC">
    <option value="Southern Oak">
    <option value="Edison">
    <option value="American Integrity">
    <option value="Kin">
    <option value="Monarch">
    <option value="Other">
  </datalist>
</div>

<div class="col-12 col-md-4">
  <label class="form-label">Policy name/type</label>
  <input class="form-control" name="policy_name_or_type" list="policy_types" placeholder="Select or type policy">
  <datalist id="policy_types">
    <option value="HO3">
    <option value="HO4">
    <option value="HO5">
    <option value="DP3">
    <option value="Condo Policy">
    <option value="Commercial Property">
    <option value="Commercial Package">
    <option value="Church Policy">
    <option value="Landlord Policy">
    <option value="Renters Policy">
    <option value="Other">
  </datalist>
</div>

<div class="col-12 col-md-2">
  <label class="form-label">Roof age</label>
  <select class="form-select" name="roof_age">
    <option value=""></option>
    {% for i in range(1, 31) %}
    <option value="{{ i }}">{{ i }}</option>
    {% endfor %}
    <option value="30+">30+</option>
    <option value="Unknown">Unknown</option>
  </select>
</div>

<div class="col-12 col-md-2">
  <label class="form-label">Home year</label>
  <input class="form-control" name="home_year" list="home_year_options" placeholder="Select or type year">
  <datalist id="home_year_options">
    {% for y in range(2026, 1899, -1) %}
    <option value="{{ y }}">
    {% endfor %}
    <option value="Unknown">
  </datalist>
</div>

<div class="col-12 col-md-2">
  <label class="form-label">Years in house</label>
  <select class="form-select" name="years_in_house">
    <option value=""></option>
    {% for i in range(1, 31) %}
    <option value="{{ i }}">{{ i }}</option>
    {% endfor %}
    <option value="30+">30+</option>
    <option value="Unknown">Unknown</option>
  </select>
</div>

<div class="col-12 col-md-2">
  <label class="form-label">Prior claim</label>
  <select class="form-select" name="prior_claim">
    <option></option>
    <option>Yes</option>
    <option>No</option>
    <option>Unknown</option>
  </select>
</div>

<div class="col-12 col-md-4">
  <label class="form-label">Prior claim details</label>
  <input class="form-control" name="prior_claim_details" placeholder="Claim date, carrier response, amount, type of loss">
</div>

<div class="col-12 col-md-3">
  <label class="form-label">Property type</label>
  <select class="form-select" name="property_type">
    <option value=""></option>
    <option value="Residential Single Family">Residential Single Family</option>
    <option value="Residential Double Story">Residential Double Story</option>
    <option value="Rental Property">Rental Property</option>
    <option value="Condominium">Condominium</option>
    <option value="Commercial">Commercial</option>
    <option value="Church">Church</option>
    <option value="Other">Other</option>
  </select>
</div>

<div class="col-12 col-md-3">
  <label class="form-label">Damage type</label>
  <input class="form-control" name="damage_type" list="damage_type_options" placeholder="Select or type claim / damage">
  <datalist id="damage_type_options">
    <option value="Hurricane">
    <option value="Wind">
    <option value="Hail">
    <option value="Water">
    <option value="Roof Leak">
    <option value="Ceiling Damage">
    <option value="Kitchen Leak">
    <option value="Bathroom Leak">
    <option value="Plumbing Leak">
    <option value="AC Leak">
    <option value="Mold">
    <option value="Fire">
    <option value="Smoke">
    <option value="Collapse">
    <option value="Storm Damage">
    <option value="Interior Water Damage">
    <option value="Exterior Damage">
    <option value="Flood">
    <option value="Other">
  </datalist>
</div>

<div class="col-12 col-md-3">
  <label class="form-label">Best time to contact</label>
  <input class="form-control" name="best_time_to_contact" list="best_contact_options" placeholder="Select or type">
  <datalist id="best_contact_options">
    <option value="Morning">
    <option value="Afternoon">
    <option value="Evening">
    <option value="Anytime">
    <option value="Weekdays">
    <option value="Weekends">
  </datalist>
</div>

<div class="col-12 col-md-3">
  <label class="form-label">Follow-up type</label>
  <select class="form-select" name="follow_up_type">
    <option value=""></option>
    <option>call</option>
    <option>text</option>
    <option>second_visit</option>
    <option>inspection_confirmation</option>
    <option>document_followup</option>
  </select>
</div>

<div class="col-12 col-md-4">
  <label class="form-label">Follow-up date</label>
  <input type="date" class="form-control" name="follow_up_date">
</div>

<div class="col-12 col-md-4">
  <label class="form-label">Inspection date</label>
  <input type="date" class="form-control" name="inspection_date">
</div>

<div class="col-12 col-md-4">
  <label class="form-label">Inspection time</label>
  <input type="time" class="form-control" name="inspection_time">
</div>

<div class="col-12">
  <label class="form-label">Damage details</label>
  <textarea class="form-control" name="damage_details" rows="2" placeholder="Describe visible damage, rooms affected, roof, interior, leak source, etc."></textarea>
</div>

<div class="col-12">
  <label class="form-label">Owner objections</label>
  <textarea class="form-control" name="owner_objections" rows="2" placeholder="Not interested, already has PA, wants to call later, deductible concern, trust issue, etc."></textarea>
</div>

<div class="col-12">
  <label class="form-label">Conversation summary</label>
  <textarea class="form-control" name="conversation_summary" rows="2" placeholder="Quick summary of what happened in the conversation"></textarea>
</div>

<div class="col-12">
  <label class="form-label">Notas generales</label>
  <textarea class="form-control" name="notes" rows="3" placeholder="Full internal notes"></textarea>
</div>

<div class="col-12">
  <label class="form-label">Next action</label>
  <input class="form-control" name="next_action" list="next_action_options" placeholder="Select or type next action">
  <datalist id="next_action_options">
    <option value="Send text follow-up">
    <option value="Call back">
    <option value="Second visit">
    <option value="Send documents">
    <option value="Schedule inspection">
    <option value="Confirm inspection">
    <option value="Review policy">
    <option value="Follow up on signed LOR">
    <option value="Pending carrier response">
    <option value="Collect photos">
    <option value="Other">
  </datalist>
</div>

    <div class="col-12 d-flex gap-2">
      <button class="btn btn-primary">Guardar</button>
      <a class="btn btn-outline-secondary" href="/">Cancelar</a>
    </div>
  </div>
</form>
{% endblock %}
{% block scripts %}
<script>
async function captureGPS() {
    if (!navigator.geolocation) {
        alert("GPS no disponible");
        return;
    }

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const lat = pos.coords.latitude.toFixed(6);
        const lng = pos.coords.longitude.toFixed(6);

        document.getElementById("latitude").value = lat;
        document.getElementById("longitude").value = lng;

        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
            const data = await response.json();

            if (data && data.address) {
                const addr = data.address;

                const houseNumber = addr.house_number || "";
const road = addr.road || "";
const city = addr.city || addr.town || addr.village || addr.municipality || addr.hamlet || addr.suburb || "";
const state = addr.state || "FL";
const zipcode = addr.postcode || "";
const county = addr.county || "";

const suggestedAddress = [
  houseNumber,
  road,
  city,
  state,
  zipcode
].filter(Boolean).join(", ");

const fullAddress = suggestedAddress || data.display_name || "";

const fullAddressInput = document.querySelector('input[name="full_address"]');
const houseInput = document.querySelector('input[name="house_number"]');
const zipInput = document.querySelector('input[name="zipcode"]');
const streetInput = document.querySelector('input[name="street_name"]');
const cityInput = document.querySelector('input[name="city"]');
const stateInput = document.querySelector('input[name="state"]');
const countyInput = document.querySelector('input[name="county"]');

if (fullAddressInput) fullAddressInput.value = fullAddress;
if (houseInput) houseInput.value = houseNumber;
if (zipInput) zipInput.value = zipcode;
if (streetInput) streetInput.value = road;
if (cityInput) cityInput.value = city;
if (stateInput) stateInput.value = state;
if (countyInput) countyInput.value = county;

const confirmed = confirm(
  "Dirección detectada:\n\n" +
  fullAddress +
  "\n\nPresione Aceptar si es correcta.\n" +
  "Presione Cancelar para corregirla manualmente antes de guardar."
);

if (!confirmed && fullAddressInput) {
  fullAddressInput.focus();
}
   } else {
  alert("Se capturó el GPS, pero no se pudo traducir a dirección.");
}
} catch (error) {
  alert("Se capturó el GPS, pero falló la conversión a dirección.");
}
}, () => {
    alert("No se pudo obtener la ubicación");
  });
}
</script>
{% endblock %}
