<script>
async function captureGPS() {
    if (!navigator.geolocation) {
        alert("GPS no disponible");
        return;
    }

   navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude.toFixed(6);
        const lng = pos.coords.longitude.toFixed(6);

        document.getElementById("latitude").value = lat;
        document.getElementById("longitude").value = lng;
fetch(https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng})
    .then(response => response.json())
    .then(data => {
        if (data && data.address) {
            const addr = data.address;

            const houseNumber = addr.house_number || "";
            const road = addr.road || "";
            const city = addr.city || addr.town || addr.village || addr.municipality || addr.hamlet || addr.suburb || "";
            const state = addr.state || "FL";
            const zipcode = addr.postcode || "";
            const county = addr.county || "";

            const suggestedAddress = [
                houseNumber,
                road,
                city,
                state,
                zipcode
            ].filter(Boolean).join(", ");

            const fullAddress = suggestedAddress || data.display_name || "";

            const fullAddressInput = document.querySelector('input[name="full_address"]');
            const houseInput = document.querySelector('input[name="house_number"]');
            const zipInput = document.querySelector('input[name="zipcode"]');
            const streetInput = document.querySelector('input[name="street_name"]');
            const cityInput = document.querySelector('input[name="city"]');
            const stateInput = document.querySelector('input[name="state"]');
            const countyInput = document.querySelector('input[name="county"]');

            if (fullAddressInput) fullAddressInput.value = fullAddress;
            if (houseInput) houseInput.value = houseNumber;
            if (zipInput) zipInput.value = zipcode;
            if (streetInput) streetInput.value = road;
            if (cityInput) cityInput.value = city;
            if (stateInput) stateInput.value = state;
            if (countyInput) countyInput.value = county;

            const confirmed = confirm(
                "Dirección detectada:\n\n" +
                fullAddress +
                "\n\nPresione Aceptar si es correcta.\n" +
                "Presione Cancelar para corregirla manualmente antes de guardar."
            );

            if (!confirmed && fullAddressInput) {
                fullAddressInput.focus();
            }
        } else {
            alert("Se capturó el GPS, pero no se pudo traducir a dirección.");
        }
    })
    .catch(error => {
        console.error("GPS reverse geocoding error:", error);
        alert("Se capturó el GPS, pero falló la conversión a dirección.");
    });
        }, () => {
    alert("No se pudo obtener la ubicación");
  });
}
  function formatPhoneValue(value) {
    const digits = (value || "").replace(/\D/g, "").slice(0, 11);

    if (!digits) return "";

    let normalized = digits;
    if (normalized.length === 10) {
      normalized = "1" + normalized;
    }

    if (normalized[0] !== "1") {
      normalized = "1" + normalized.slice(0, 10);
    }

    const country = normalized.slice(0, 1);
    const area = normalized.slice(1, 4);
    const first = normalized.slice(4, 7);
    const second = normalized.slice(7, 11);
  let formatted = `+${country}`;
if (area) formatted += ` (${area}`;
if (area.length === 3) formatted +=`)`;
if (first) formatted += ` ${first}`;
if (second) formatted += `-${second}`;
    return formatted;
  }

  function attachPhoneMask(inputId) {
    const input = document.getElementById(inputId);
    if (!input) return;

    input.addEventListener("input", function () {
      this.value = formatPhoneValue(this.value);
    });

    input.addEventListener("blur", function () {
      this.value = formatPhoneValue(this.value);
    });

    input.addEventListener("paste", function () {
      setTimeout(() => {
        this.value = formatPhoneValue(this.value);
      }, 0);
    });

    if (input.value) {
      input.value = formatPhoneValue(input.value);
    }
  }

  attachPhoneMask("phone");
  attachPhoneMask("alternate_phone");
document.addEventListener("DOMContentLoaded", function () {
  const form = document.querySelector("form");
  if (!form) return;

  const phoneInput = document.getElementById("phone");
  const alternatePhoneInput = document.getElementById("alternate_phone");

  // Formatear al cargar
  if (phoneInput && phoneInput.value) {
    phoneInput.value = formatPhoneValue(phoneInput.value);
  }

  if (alternatePhoneInput && alternatePhoneInput.value) {
    alternatePhoneInput.value = formatPhoneValue(alternatePhoneInput.value);
  }

  // Limpiar antes de enviar
  form.addEventListener("submit", function () {
    if (phoneInput && phoneInput.value) {
      phoneInput.value = phoneInput.value.replace(/\D/g, "");
    }

    if (alternatePhoneInput && alternatePhoneInput.value) {
      alternatePhoneInput.value = alternatePhoneInput.value.replace(/\D/g, "");
    }
  });
});
  
</script>
